<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudPedagogy | AI Workflow Governance Designer</title>
    <meta name="description" content="A governance-ready design environment for creating, analysing, and documenting AI-supported workflows." />
  </head>
  <body>
    <div id="app">
      <nav class="sidebar">
        <div class="logo">
          <a href="https://www.cloudpedagogy.com/">CloudPedagogy</a>
        </div>
        <div class="nav-links">
          <button class="nav-item active" data-view="dashboard">
            Dashboard
          </button>
          <button class="nav-item" data-view="workflow-context">
            Context
          </button>
          <button class="nav-item" data-view="workflow-builder">
            Step Builder
          </button>
          <button class="nav-item" data-view="governance-panel">
            Governance
          </button>
          <button class="nav-item" data-view="reflection-layer">
            Reflection
          </button>
          <button class="nav-item" data-view="export-panel">
            Export
          </button>
        </div>
        <div class="sidebar-footer">
          <div class="completeness-mini">
            <div class="label">Governance Completeness</div>
            <div class="progress-bar">
              <div class="progress" style="width: 0%"></div>
            </div>
            <div class="value">0%</div>
          </div>
        </div>
      </nav>

      <main class="content">
        <header class="top-bar">
          <div class="header-branding">
            <div id="app-name" class="app-name">AI Workflow Governance Designer</div>
          </div>
          <div class="header-divider">/</div>
          <h1 id="view-title">Dashboard</h1>
          <div class="top-actions">
            <button id="load-demo" class="btn btn-secondary">Demo Example</button>
            <button id="new-workflow" class="btn btn-secondary">New Workflow</button>
            <button id="save-workflow" class="btn btn-primary">Save Local</button>
            <button id="import-workflow" class="btn btn-secondary">Import JSON</button>
          </div>
        </header>

        <div id="view-container" class="view-container">
          <!-- Views will be injected here -->
        </div>

        <footer class="page-footer">
          <p class="footer-text">CloudPedagogy · Governance-ready AI and curriculum systems</p>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
